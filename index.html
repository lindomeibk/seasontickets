<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incheckning Sponsorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            margin: 0;
            background-color: #f0f0f0;
            transition: background-color 0.5s ease;
        }
        .container {
            padding: 20px;
            background: white;
            margin: 20px auto;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .status-box {
            color: white;
            padding: 20px;
            border-radius: 5px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .loading { background-color: #ffa500; }
        .green { background-color: #4CAF50; }
        .red { background-color: #f44336; }
        .info { font-size: 18px; color: #333; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <div id="statusVisual" class="status-box loading">⏳ LADDAR...</div>
        <div id="infoText" class="info">Kontrollerar sponsorkort, vänta en sekund...</div>
    </div>

    <script>
// 1. Hämta namnet från URL-parametern
const urlParams = new URLSearchParams(window.location.search);
const namnParam = urlParams.get('namn');

// 2. KLISTRA IN DIN NYA WEBAPP-LÄNK FRÅN GOOGLE HÄR:
const googleScriptUrl = "https://script.google.com/macros/s/AKfycbxtB6L-PZFn3lUJJrpDe95-UL9ZIBnTIgboxF8Kncc-IR9-zPLUK5xGsTd2ds7ex1KIwg/exec";

if (!namnParam) {
    visaFel("Ingen sponsor identifierades i QR-koden.");
} else {
    // 3. Skapa ett JSONP-anrop för att runda säkerhetsblockeringen (CORS)
    const callbackName = 'googleCallback_' + Math.round(Math.random() * 1000000);
    
    // Skapa funktionen som Google ska ropa på när den är klar
    window[callbackName] = function(data) {
        // Städa bort scriptet efteråt
        delete window[callbackName];
        
        const statusBox = document.getElementById('statusVisual');
        const infoBox = document.getElementById('infoText');

        if (data.status === "GRÖNT") {
            document.body.style.backgroundColor = "#e8f5e9";
            statusBox.className = "status-box green";
            statusBox.innerText = "🟩 GODKÄND";
            infoBox.innerHTML = `<strong>${data.foretag}</strong><br>Besök ${data.aktuelltBesok} av ${data.maxAntal}`;
        } else {
            document.body.style.backgroundColor = "#ffebee";
            statusBox.className = "status-box red";
            statusBox.innerText = "🟥 NEKAD";
            infoBox.innerHTML = `<strong>${data.foretag}</strong><br>${data.meddelande || 'Max antal besök nått!'}<br>(Försök nr: ${data.aktuelltBesok} av ${data.maxAntal})`;
        }
    };

    // Skapa en osynlig länk som startar anropet
    const script = document.createElement('script');
    script.src = `${googleScriptUrl}?namn=${encodeURIComponent(namnParam)}&callback=${callbackName}`;
    script.onerror = function() {
        visaFel("Kunde inte kontakta databasen (Scriptfel).");
    };
    document.body.appendChild(script);
}

function visaFel(meddelande) {
    document.getElementById('statusVisual').className = "status-box red";
    document.getElementById('statusVisual').innerText = "❌ SYSTEMFEL";
    document.getElementById('infoText').innerText = meddelande;
}
        }
    </script>
</body>
</html>
