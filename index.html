<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incheckning Sponsorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            margin: 0;
            background-color: #f0f0f0;
            transition: background-color 0.5s ease;
        }
        .container {
            padding: 20px;
            background: white;
            margin: 20px auto;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .status-box {
            color: white;
            padding: 20px;
            border-radius: 5px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .loading { background-color: #ffa500; }
        .green { background-color: #4CAF50; }
        .red { background-color: #f44336; }
        .info { font-size: 18px; color: #333; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <div id="statusVisual" class="status-box loading">⏳ LADDAR...</div>
        <div id="infoText" class="info">Kontrollerar sponsorkort, vänta en sekund...</div>
    </div>

    <script>
// 1. Hämta namnet från webbadressen
const urlParams = new URLSearchParams(window.location.search);
const namnParam = urlParams.get('namn');

// 2. DIN WEBAPP-LÄNK FRÅN GOOGLE:
const googleScriptUrl = "https://script.google.com/macros/s/AKfycbwlaioW4vhJqP54t1kCsYH5yUYFRAzCHvJAoXAVU2i1Y2_XfB71jOxACIRPi6Rt3fT6MQ/exec";

if (!namnParam) {
    visaFel("Ingen sponsor identifierades i QR-koden.");
} else {
    // 3. Gör anropet utan cookies för att undvika kontokrockar
    fetch(`${googleScriptUrl}?namn=${encodeURIComponent(namnParam)}`, {
        method: 'GET',
        mode: 'cors',
        credentials: 'omit'
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Nätverksfel eller spärr från Google');
        }
        return response.json();
    })
    .then(data => {
        console.log("Svar från Google:", data);
        
        const statusBox = document.getElementById('statusVisual');
        
        // 4. Här kollar vi vad Google faktiskt beslutade!
        if (data.status === "GRÖNT") {
            // Incheckningen gick bra!
            document.body.style.backgroundColor = "#e8f5e9"; // Ljusgrön
            statusBox.className = "status-box green";
            statusBox.innerText = "🟩 GODKÄND";
            
            document.getElementById('infoText').innerHTML = `
                <strong>${data.foretag}</strong><br>
                ${data.meddelande}<br>
                <span style="font-size: 16px; display: inline-block; margin-top: 10px;">
                    Besök registrerat: <strong>${data.aktuelltBesok}</strong> av ${data.maxAntal}
                </span>
            `;
        } else {
            // Företaget hittades inte ELLER kortet är förbrukat
            document.body.style.backgroundColor = "#ffebee"; // Ljusröd
            statusBox.className = "status-box red";
            statusBox.innerText = "❌ NEKAD";
            
            document.getElementById('infoText').innerHTML = `
                <strong>${data.foretag}</strong><br>
                <span style="color: #c62828; font-weight: bold;">${data.meddelande}</span><br>
                <span style="font-size: 14px; display: inline-block; margin-top: 10px;">
                    Totalt använda besök: ${data.aktuelltBesok} av ${data.maxAntal}
                </span>
            `;
        }
    })
    .catch(error => {
        console.error("Fel vid anrop:", error);
        visaFel("Systemfel: Kunde inte kontakta databasen (Scriptfel).");
    });
}

function visaFel(meddelande) {
    document.getElementById('statusVisual').className = "status-box red";
    document.getElementById('statusVisual').innerText = "❌ FEL";
    document.getElementById('infoText').innerText = meddelande;
}
    </script>
</body>
</html>
