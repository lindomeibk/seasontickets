<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incheckning Sponsorer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            margin: 0;
            background-color: #f0f0f0;
            transition: background-color 0.5s ease;
        }
        .container {
            padding: 20px;
            background: white;
            margin: 20px auto;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .status-box {
            color: white;
            padding: 20px;
            border-radius: 5px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .loading { background-color: #ffa500; }
        .green { background-color: #4CAF50; }
        .red { background-color: #f44336; }
        .info { font-size: 18px; color: #333; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <div id="statusVisual" class="status-box loading">⏳ LADDAR...</div>
        <div id="infoText" class="info">Kontrollerar sponsorkort, vänta en sekund...</div>
    </div>

    <script>
// 1. Hämta namnet från webbadressen
const urlParams = new URLSearchParams(window.location.search);
const namnParam = urlParams.get('namn');

// 2. DIN WEBAPP-LÄNK FRÅN GOOGLE:
const googleScriptUrl = "https://script.google.com/macros/s/AKfycbyQGaMkRmz3Vc7ctp0XCCPLQ94xEBj86AYvbb5DZPg66jyuD0TV3Yv6BJZ8Szwy8pNaDA/exec";

// 3. Denna funktion MÅSTE finnas globalt så att Google kan ropa av den
window.googleCallback = function(data) {
    // Om vi kommer hit har CORB och alla spärrar passerats!
    console.log("Svar från Google mottaget:", data);
    
    document.body.style.backgroundColor = "#e8f5e9";
    const statusBox = document.getElementById('statusVisual');
    statusBox.className = "status-box green";
    statusBox.innerText = "🟩 GODKÄND";
    
    document.getElementById('infoText').innerHTML = `
        <strong>Koppling fungerar!</strong><br>
        Meddelande från Google:<br>
        <span style="font-size: 16px; color: #2e7d32;">${data.meddelande}</span>
    `;
};

if (!namnParam) {
    visaFel("Ingen sponsor identifierades i QR-koden.");
} else {
    // 4. Vi bygger ett helt eget, rent script-anrop för JSONP
    const script = document.createElement('script');
    
    // Vi hårdkodar &callback=googleCallback så att det matchar funktionen ovan exakt
    script.src = `${googleScriptUrl}?namn=${encodeURIComponent(namnParam)}&callback=googleCallback`;
    
    script.onerror = function() {
        visaFel("Systemfel: Kunde inte kontakta databasen (Scriptfel).");
    };
    
    // Lägg till skriptet på sidan för att avfyra anropet
    document.body.appendChild(script);
}

function visaFel(meddelande) {
    document.getElementById('statusVisual').className = "status-box red";
    document.getElementById('statusVisual').innerText = "❌ FEL";
    document.getElementById('infoText').innerText = meddelande;
}
    </script>
</body>
</html>
